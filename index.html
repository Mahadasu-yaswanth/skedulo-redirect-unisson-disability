<!DOCTYPE html>
<html>
<head>
  <title>Opening Skedulo...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin:0;background:#ffc20e;">

  <a id="deeplink" href="skedulox://agenda" style="display:none;">Open</a>

  <script>
    var ua = navigator.userAgent;
    if (/android/i.test(ua)) {
      window.location.href = "intent://agenda#Intent;scheme=skedulox;package=com.skedulo.app.v3;end";
    } else if (/iPad|iPhone|iPod/.test(ua)) {
      document.getElementById('deeplink').style.display = 'block';
      document.getElementById('deeplink').style.cssText = 
        'position:fixed;top:0;left:0;width:100%;height:100%;background:#ffc20e;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:22px;font-weight:bold;color:#6b2a6b;text-decoration:none;';
      document.getElementById('deeplink').innerText = 'Tap to Open Skedulo';
    }
  </script>

</body>
</html>
