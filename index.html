<!DOCTYPE html>
<html lang="en">
<head>
  <title>Opening Skedulo...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin:0; background:#ffc20e; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:sans-serif; padding:24px; }
    a.btn { display:block; background:#6b2a6b; color:#ffc20e; padding:18px 48px; border-radius:14px; font-size:19px; font-weight:700; text-decoration:none; text-align:center; width:100%; max-width:320px; margin-top:24px; }
    p { color:#3a1200; font-size:16px; text-align:center; }
  </style>
</head>
<body>
  <p>Opening Skedulo...</p>
  <a id="btn" class="btn" href="skedulox://agenda">Tap here if it doesn't open</a>
  <script>
    var ua = navigator.userAgent || '';
    // Auto-fire — this page is opened in Chrome/Safari so it works
    if (/android/i.test(ua)) {
      document.getElementById('btn').href = "intent://agenda#Intent;scheme=skedulox;package=com.skedulo.app.v3;end";
      window.location.href = "intent://agenda#Intent;scheme=skedulox;package=com.skedulo.app.v3;end";
    } else {
      window.location.href = "skedulox://agenda";
    }
  </script>
</body>
</html>
