<!DOCTYPE html>
<html>
<head>
  <title>Opening Skedulo...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #ffc20e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", sans-serif;
      padding: 30px;
      text-align: center;
    }
    .logo {
      width: 70px; height: 70px;
      background: #6b2a6b;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
    }
    .logo svg { width: 40px; height: 40px; fill: #ffc20e; }
    h1 { font-size: 22px; font-weight: 700; color: #6b2a6b; margin-bottom: 10px; }
    p  { font-size: 15px; color: #5a2060; margin-bottom: 32px; }

    .btn {
      display: inline-block;
      background: #6b2a6b;
      color: #ffc20e;
      font-size: 17px;
      font-weight: 700;
      padding: 16px 36px;
      border-radius: 12px;
      text-decoration: none;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 14px rgba(107,42,107,0.25);
      transition: background 0.2s, transform 0.1s;
      cursor: pointer;
      border: none;
    }
    .btn:active { transform: scale(0.97); }

    .note {
      margin-top: 28px;
      font-size: 13px;
      color: #7a4a00;
      max-width: 300px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="logo">
    <!-- Calendar/schedule icon -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M19 4h-1V2h-2v2H8V2H6v2H5C3.9 4 3 4.9 3 6v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2zm-7 5h5v5h-5z"/>
    </svg>
  </div>

  <h1>Opening Skedulo…</h1>
  <p>Tap the button below to open the Skedulo app.</p>

  <a class="btn" id="openBtn" href="skedulox://agenda">Open Skedulo</a>

  <p class="note" id="noteText"></p>

  <script>
    (function () {
      var ua = navigator.userAgent;
      var isAndroid = /android/i.test(ua);
      var isIOS = /iPad|iPhone|iPod/.test(ua);
      var btn = document.getElementById('openBtn');
      var note = document.getElementById('noteText');

      if (isAndroid) {
        // Intent URI works in Chrome and most Android browsers.
        // Teams WebView on Android strips intents, so we try the custom
        // scheme first and fall back gracefully.
        btn.href = "skedulox://agenda";

        btn.addEventListener('click', function (e) {
          e.preventDefault();

          // Try custom scheme
          var start = Date.now();
          var fallbackTimer;

          // Hidden iframe trick — avoids navigation errors on failed schemes
          var iframe = document.createElement('iframe');
          iframe.style.display = 'none';
          iframe.src = "skedulox://agenda";
          document.body.appendChild(iframe);

          fallbackTimer = setTimeout(function () {
            if (Date.now() - start < 2000) {
              // App didn't open — try intent URI in new context
              window.location.href =
                "intent://agenda#Intent;scheme=skedulox;package=com.skedulo.app.v3;end";
            }
          }, 1200);

          // If page hides (app opened), cancel fallback
          document.addEventListener('visibilitychange', function () {
            if (document.hidden) clearTimeout(fallbackTimer);
          });
        });

        note.textContent =
          "If Skedulo doesn't open, tap the ↗ icon at the top right to open this page in your browser, then tap the button.";

      } else if (isIOS) {
        btn.href = "skedulox://agenda";

        btn.addEventListener('click', function (e) {
          e.preventDefault();
          window.location.href = "skedulox://agenda";

          // iOS: if app not installed or Teams blocks it, show store link after delay
          setTimeout(function () {
            note.innerHTML =
              "App didn't open? <a href='https://apps.apple.com/app/skedulo/id1097672372' " +
              "style='color:#6b2a6b;font-weight:700;'>Download Skedulo from the App Store</a>.";
          }, 2500);
        });

        note.textContent =
          "If nothing happens, tap ↗ to open in Safari, then tap the button again.";

      } else {
        // Desktop fallback
        btn.href = "skedulox://agenda";
        note.textContent = "On desktop, make sure Skedulo is installed and running.";
      }
    })();
  </script>
</body>
</html>
